<!DOCTYPE html>
<html>
<body>
  <h2>Login</h2>

  <input id="email" value="dan@dan.com">
  <br><br>

  <input id="password" type="password" value="dan123">
  <br><br>

  <button onclick="login()">Login</button>
  
  <h3>Get User Info</h3>
  <button onclick="fetchProfile()">Get User from DB</button>

  <pre id="result"></pre>

  <script>
    let token = "";

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      if (email === "" || password === "") {
        document.getElementById("result").innerText = "Fields cannot be empty";
        return;
      }

      const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      });

      if (res.status === 200) {
        token = await res.text();
        document.getElementById("result").innerText = "Token: " + token;
      } else {
        document.getElementById("result").innerText = "Error: " + await res.text();
      }
    }

    async function fetchProfile() {
      if (token === "") {
        document.getElementById("result").innerText = "Please login first!";
        return;
      }

      const res = await fetch("http://localhost:3000/profile", {
        method: "GET",
        headers: { "x-auth-token": token }
      });

      document.getElementById("result").innerText = await res.text();
    }
  </script>
</body>
</html>
